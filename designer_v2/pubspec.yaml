name: studyu_designer_v2
version: 1.18.0
description: Implement digital N-of-1 studies seamlessly with the StudyU Health Designer
publish_to: none
homepage: https://studyu.health
repository: https://github.com/hpi-studyu/studyu

environment:
  sdk: ">=3.8.0 <4.0.0"
resolution: workspace

dependencies:
  archive: ^4.0.9
  async: ^2.13.1
  collection: ^1.19.1
  csv: ^8.0.0
  cupertino_icons: ^1.0.9
  dynamic_color: ^1.8.1
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_colorpicker: ^1.1.0
  flutter_driver:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_material_design_icons: ^3.1.0+7447
  flutter_riverpod: ^3.3.2
  flutter_web_plugins:
    sdk: flutter
  go_router: ^17.3.0
  intl: ^0.20.2
  material_color_utilities: ^0.13.0 # integration_test
  package_info_plus: ^10.2.0
  pointer_interceptor: ^0.10.1+2
  reactive_color_picker: ^2.2.2
  reactive_forms: ^18.2.2
  reactive_multi_select_flutter: ^2.0.2
  reactive_range_slider: ^2.1.1
  riverpod_annotation: ^4.0.3
  rxdart: ^0.28.0
  studyu_core: ^4.9.0
  studyu_flutter_common: ^1.10.4
  supabase: ^2.13.0
  supabase_flutter: ^2.15.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.15.0
  # flutter_launcher_icons: ^0.14.4 # seems deprecated, maybe icons_launcher is an alternative
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  json_diff: ^0.2.1
  lint: ^2.8.0
  mockito: ^5.6.3
  patrol_finders: ^3.5.0
  riverpod_generator: ^4.0.4
  test: ^1.30.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/icon/
    - assets/images/

flutter_launcher_icons:
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#0175C2" # "#dfdfdf"
    theme_color: "#0175C2" # "#389bea"
