name: studyu_designer_v2
version: 1.11.1
description: Implement digital N-of-1 studies seamlessly with the StudyU Health Designer
publish_to: none
homepage: https://studyu.health
repository: https://github.com/hpi-studyu/studyu

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  archive: ^4.0.7
  async: ^2.13.0
  collection: ^1.19.1
  csv: ^6.0.0
  cupertino_icons: ^1.0.8
  dynamic_color: ^1.8.1
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_colorpicker: ^1.1.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_web_plugins:
    sdk: flutter
  go_router: ^15.2.0
  intl: ^0.20.2
  material_color_utilities: ^0.11.1 # integration_test
  material_design_icons_flutter: ^7.0.7296
  pointer_interceptor: ^0.10.1+2
  reactive_color_picker: ^2.2.2
  reactive_forms: ^18.1.1
  reactive_multi_select_flutter: ^2.0.2
  reactive_range_slider: ^2.1.1
  riverpod_annotation: ^2.6.1
  rxdart: ^0.28.0
  studyu_core: ^4.6.1
  studyu_flutter_common: ^1.8.13
  supabase: ^2.8.0
  supabase_flutter: ^2.9.1
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.5.0
  custom_lint: ^0.7.5
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  json_diff: ^0.2.1
  lint: ^2.8.0
  patrol_finders: ^2.9.0
  riverpod_generator: ^2.6.5
  riverpod_lint: ^2.6.5
  test: ^1.25.15 # integration_test

dependency_overrides:
  analyzer: ^8.1.1
  analyzer_plugin: ^0.13.6
  custom_lint_visitor: ^1.0.0+7.7.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/icon/

flutter_launcher_icons:
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#0175C2" # "#dfdfdf"
    theme_color: "#0175C2" # "#389bea"
