name: studyu_app
version: 2.14.0
description: >-
  Partake in digital N-of-1 trials with the innovative StudyU Health App
publish_to: none
homepage: https://studyu.health
repository: https://github.com/hpi-studyu/studyu

environment:
  sdk: ">=3.8.0 <4.0.0"
resolution: workspace

dependencies:
  camera: ^0.12.0+1
  collection: ^1.19.1
  cross_file: ^0.3.5+4
  cupertino_icons: ^1.0.9
  fitbitter:
    git:
      url: https://github.com/hpi-studyu/fitbitter.git
      ref: master
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_file_dialog: ^3.3.1
  flutter_local_notifications: ^22.0.1
  flutter_localizations:
    sdk: flutter
  flutter_material_design_icons: ^3.1.0+7447
  flutter_native_splash: ^2.4.8
  flutter_svg: ^2.3.0
  flutter_timezone: ^5.1.0
  flutter_web_plugins:
    sdk: flutter
  flutter_widget_from_html: ^0.17.2
  gauge_indicator: ^0.6.0
  go_router: ^17.3.0
  http: ^1.2.2
  intersperse: ^2.0.0
  intl: ^0.20.2
  introduction_screen: ^4.0.0
  json_annotation: ^4.9.0
  material_design_icons_flutter: ^7.0.7296
  mobile_scanner: ^7.1.4
  openfoodfacts: ^3.21.0
  package_info_plus: ^10.2.0
  path: ^1.9.1
  path_drawing: ^1.0.1
  path_provider: ^2.1.6
  pdf: ^3.13.0
  permission_handler: ^12.0.3
  photo_manager: ^3.6.0
  provider: ^6.1.5+1
  quiver: ^3.2.2
  rainbow_color: ^2.0.1
  record: ^7.1.1
  shared_preferences: ^2.5.5
  showcaseview: 5.1.0
  stack_deferred_link: ^1.0.1
  statistics: ^1.2.1
  studyu_core: ^4.9.0
  studyu_flutter_common: ^1.10.4
  supabase: ^2.14.0
  supabase_flutter: ^2.16.0
  timeline_tile: ^2.0.0
  timezone: ^0.11.1
  touchable: ^1.0.2
  universal_html: ^2.3.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  wakelock_plus: ^1.6.1
  xml: ^7.0.1

dev_dependencies:
  build_runner: ^2.10.3
  # flutter_launcher_icons: ^0.14.4
  # Deprecated? icons_launcher may be an alternative.
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.11.1
  lint: ^2.8.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/
    - assets/fonts/
    - assets/images/
    - assets/images/onboarding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  image_path_ios: "assets/icon/icon_bg.png"
  remove_alpha_ios: true
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#0175C2" # "#dfdfdf"
    theme_color: "#0175C2" # "#389bea"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/icon/icon.png
  # branding: assets/icon/logo.png
  # branding_bottom_padding: 24
  android_12:
    image: assets/icon/icon_android12.png
    color: "#ffffff"
    # icon_background_color: "#ffffff"
    # branding: assets/icon/logo.png
  fullscreen: true
  # web: false
