  results/numeric-result.md:
    title: Numeric Result
    classes: [NumericResult]
    fields:
      type: Fixed value `numeric`.
      id: Unique result identifier (UUID).
      filename: CSV export filename for this result type.
      resultProperty: Reference to the numeric property this result captures.

  questionnaire/nested-objects.md:
    title: Questionnaire Nested Objects
    classes: [ Choice, Annotation ]
    fields:
      id: Unique choice identifier used in choice answers.
      text: Participant-facing choice label.
      value: Numeric scale value that receives an annotation.
      annotation: Label shown for the annotated scale value.

  shared/question-conditional.md:
    title: Question Conditional
    classes: [ QuestionConditional ]
    generated_fields: false
    fields: { }


  shared/data-reference.md:
    title: Data Reference
    classes: [DataReference]
    fields:
      task: ID of the task this reference points to.
      property: Name of the specific property within the task result to reference.

  shared/expressions.md:
    title: Expressions
    classes: [Expression, BooleanExpression, ChoiceExpression, NumericExpression, TextExpression, CompositeExpression, NotExpression]
    generated_fields: false
    fields: {}


