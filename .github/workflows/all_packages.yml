name: All Packages

on:
  push:
    paths:
      - "app/**"
      - "core/**"
      - "designer_v2/**"
      - "flutter_common/**"
      - '*.gitignore'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - ".github/workflows/all_packages.yml"
      - ".github/workflows/init-workspace/**"
  workflow_dispatch:

env:
  MELOS_SDK_PATH: 'auto'

concurrency:
  group: ${{ github.ref }}-all-packages
  cancel-in-progress: true

jobs:
  static_analysis_fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.READY_TO_MERGE_TOKEN }}

      - name: Init workspace
        uses: ./.github/workflows/init-workspace

      - name: Run fix
        run: melos run fix

      - name: Run quality check
        run: melos qualitycheck

      - name: Commit changes if any
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: 'chore: Apply static analysis changes'
          file_pattern: ':!*.fvmrc'

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Init workspace
        uses: ./.github/workflows/init-workspace

      - name: Run Test
        run: melos run test --no-select
