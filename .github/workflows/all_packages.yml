name: All Packages

on:
  push:
    paths:
      - "app/**"
      - "core/**"
      - "designer_v2/**"
      - "flutter_common/**"
      - "tools/study_data_docs/**"
      - "tools/studyu_mcp/**"
      - "tools/studyu_validator/**"
      - '*.gitignore'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - ".github/workflows/all_packages.yml"
      - ".github/workflows/init-workspace/**"
  workflow_dispatch:

env:
  MELOS_SDK_PATH: 'auto'

concurrency:
  group: ${{ github.ref }}-all-packages
  cancel-in-progress: true

jobs:
  static_analysis_fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.READY_TO_MERGE_TOKEN }}

      - name: Init workspace
        uses: ./.github/workflows/init-workspace

      - name: Run fix
        run: melos fix

      - name: Run quality check
        run: melos qualitycheck

      - name: Restore ignored files
        shell: bash
        run: |
          shopt -s globstar nullglob
          git checkout .fvmrc 2>/dev/null || true
          git checkout .vscode/settings.json 2>/dev/null || true
          git checkout l10n-missing.txt 2>/dev/null || true
          for f in **/l10n-missing.txt; do
            git checkout "$f" 2>/dev/null || true
          done
          for f in **/app_localizations_*.dart; do
            git checkout "$f" 2>/dev/null || true
          done

      - name: Commit changes if any
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: Apply static analysis changes'

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Init workspace
        uses: ./.github/workflows/init-workspace

      - name: Run Test
        run: melos test --no-select
