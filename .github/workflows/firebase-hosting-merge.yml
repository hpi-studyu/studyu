# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/firebase-hosting-merge.yml'
      - '.github/workflows/init-workspace/action.yml'
      - 'app/**'
      - 'designer_v2/**'
      - 'core/**'
      - 'flutter_common/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'firebase.json'
      - '.firebaserc'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MELOS_SDK_PATH: 'auto'

concurrency:
  group: ${{ github.ref }}-merge
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Await potential publishing on Pub.dev
        uses: johannesvedder/await-workflow@v1
        with:
          workflowId: 'publish_pubdev.yml'
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Init workspace
        uses: ./.github/workflows/init-workspace
      - name: Enable web support
        run: flutter config --enable-web
      - name: Get StudyU versions
        run: |
          # Flutter command needs to be run to clear the initial welcome message
          flutter config --no-analytics
          
          # --- studyu_app ---
          cd app/
          app_version=$(flutter pub deps --json | jq -r '.packages[] | select(.name == "studyu_app").version')
          echo "STUDYU_APP_VERSION=$app_version" >> "$GITHUB_ENV"
          cd ..
          
          # --- studyu_designer_v2 ---
          cd designer_v2/
          designer_version=$(flutter pub deps --json | jq -r '.packages[] | select(.name == "studyu_designer_v2").version')
          echo "STUDYU_DESIGNER_VERSION=$designer_version" >> "$GITHUB_ENV"
          cd ..
      - name: Build Web
        run: melos run build:web --no-select
      - name: Stamp version info into web builds
        run: |
          # --- Stamp version info into app build ---
          jq '. + {version:$version,build_number:$buildNumber}' \
            --arg version "$STUDYU_APP_VERSION" \
            --arg buildNumber "${{ github.run_number }}" \
            app/build/web/version.json > app_version.json
          mv app_version.json app/build/web/version.json
          
          # --- Stamp version info into designer_v2 build ---
          jq '. + {version:$version,build_number:$buildNumber}' \
            --arg version "$STUDYU_DESIGNER_VERSION" \
            --arg buildNumber "${{ github.run_number }}" \
            designer_v2/build/web/version.json > designer_version.json
          mv designer_version.json designer_v2/build/web/version.json
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STUDYU_E37AF }}'
          channelId: live
          projectId: studyu-e37af
