name: Deploy apps

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'app/**'
      - 'core/**'
      - 'flutter_common/**'
      - '.github/workflows/deploy-apps.yml'
      - '.fvmrc'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  MELOS_SDK_PATH: 'auto'

concurrency:
  group: ${{ github.ref }}-deploy-apps
  cancel-in-progress: true

jobs:
  play-store-release:
    name: Create Play Store Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # NEW: Determine if this is a Prod build based on Branch OR Input
      - name: Setup Build Environment Logic
        id: env-check
        run: |
          # Default to false
          IS_PROD=false
          
          # Check Workflow Dispatch Input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.environment }}" == "prod" ]]; then
              IS_PROD=true
            fi
          # Check Branch Logic (Push event)
          elif [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/staging" ]]; then
            IS_PROD=true
          fi
          
          echo "IS_PROD=$IS_PROD" >> $GITHUB_ENV
          echo "Build environment is Prod: $IS_PROD"

      - name: Init workspace
        uses: ./.github/workflows/init-workspace

      - name: Set up ruby env
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3 # do not use head
          bundler-cache: true

      - name: Set up java env
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Bundle install for Android Gemfile
        run: bundle install
        timeout-minutes: 5
        working-directory: ./app/android

      - name: Set up Flutter with FVM
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          # todo
          cache: false

      - name: Prepare upload key
        run: |
          echo "$STUDYU_ANDROID_KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          echo "$STUDYU_KEY_PROPERTIES" > key.properties
        working-directory: app/android
        env:
          STUDYU_ANDROID_KEYSTORE_BASE64: ${{ secrets.STUDYU_ANDROID_KEYSTORE_BASE64 }}
          STUDYU_KEY_PROPERTIES: ${{ secrets.STUDYU_KEY_PROPERTIES }}

      - name: Build StudyU app bundle (prod)
        if: ${{ env.IS_PROD == 'true' }}
        run: flutter build appbundle --release --build-number ${{ github.run_number }}
        working-directory: ./app

      - name: Build StudyU app bundle (dev)
        if: ${{ env.IS_PROD == 'false' }}
        run: flutter build appbundle --release --build-number ${{ github.run_number }} --dart-define=STUDYU_ENV=.env.dev
        working-directory: ./app

      - name: Fastlane upload
        run: bundle exec fastlane deploy_internal
        working-directory: ./app/android
        timeout-minutes: 30
        env:
          PLAY_CREDS_JSON: ${{ secrets.PLAY_CREDS_JSON }}

  app-store-release:
    name: Create App Store Release
    # runs-on: macos-latest
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # NEW: Determine if this is a Prod build based on Branch OR Input
      - name: Setup Build Environment Logic
        id: env-check
        run: |
          IS_PROD=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.environment }}" == "prod" ]]; then
              IS_PROD=true
            fi
          elif [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/staging" ]]; then
            IS_PROD=true
          fi
          echo "IS_PROD=$IS_PROD" >> $GITHUB_ENV

      - name: Init workspace
        uses: ./.github/workflows/init-workspace

      - name: Set up ruby env
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3 # do not use head
          # todo
          bundler-cache: false

      - name: Bundle install for iOS Gemfile
        run: bundle install
        timeout-minutes: 5
        working-directory: ./app/ios

      - name: Set up Flutter with FVM
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          # todo
          cache: false

      - name: Get StudyU app version
        run: |
          # Read the version of study_app from pubspec.yaml and make it CFBundleShortVersionString compatible
          # Flutter command needs to be run to clear the initial welcome message
          flutter config --no-analytics
          regex="([0-9]+)\.([0-9]+)\.([0-9]+)"
          app_version=$(flutter pub deps --json | jq -r '.packages[] | select(.name == "studyu_app").version')
          if [[ $app_version =~ $regex ]]; then
            short_version_string="STUDYU_APP_VERSION=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            echo "$short_version_string"
            echo "$short_version_string" >> "$GITHUB_ENV"
          else
            echo "Version $app_version is not a valid semantic version"
            exit 1
          fi
        working-directory: ./app

      - name: Build StudyU for iOS without codesign (prod)
        if: ${{ env.IS_PROD == 'true' }}
        run: flutter build ios --release --no-codesign --build-number ${{ github.run_number }} --build-name ${{ env.STUDYU_APP_VERSION }}
        working-directory: ./app

      - name: Build StudyU for iOS without codesign (dev)
        if: ${{ env.IS_PROD == 'false' }}
        run: flutter build ios --release --no-codesign --build-number ${{ github.run_number }} --build-name ${{ env.STUDYU_APP_VERSION }} --dart-define=STUDYU_ENV=.env.dev
        working-directory: ./app

      - name: Fastlane upload
        run: bundle exec fastlane upload_testflight
        working-directory: ./app/ios
        timeout-minutes: 30
        env:
          FASTLANE_APP_IOS_KEY_ID: ${{ secrets.FASTLANE_APP_IOS_KEY_ID }}
          FASTLANE_APP_IOS_ISSUER_ID: ${{ secrets.FASTLANE_APP_IOS_ISSUER_ID }}
          FASTLANE_APP_IOS_KEY_CONTENT: ${{ secrets.FASTLANE_APP_IOS_KEY_CONTENT }}
          FASTLANE_APP_IOS_MATCH_GIT_URL: ${{ secrets.FASTLANE_APP_IOS_MATCH_GIT_URL }}
          FASTLANE_APP_IOS_MATCH_GIT_PRIVATE_KEY: ${{ secrets.FASTLANE_APP_IOS_MATCH_GIT_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          TEMP_KEYCHAIN_USER: ${{ secrets.TEMP_KEYCHAIN_USER }}
          TEMP_KEYCHAIN_PASSWORD: ${{ secrets.TEMP_KEYCHAIN_PASSWORD }}
