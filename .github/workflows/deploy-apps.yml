name: Deploy apps

on:
  push:
    branches:
      - main
      - dev
      - feat/deep-link-deferred
    paths:
      - 'app/**'
      - 'core/**'
      - 'flutter_common/**'
      - '.github/workflows/deploy-apps.yml'
      - '.fvmrc'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  MELOS_SDK_PATH: 'auto'

concurrency:
  group: ${{ github.ref }}-deploy-apps
  cancel-in-progress: true

jobs:
  play-store-release:
    name: Create Play Store Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # NEW: Determine if this is a Prod build based on Branch OR Input
      - name: Setup Build Environment Logic
        id: env-check
        run: |
          # Default to false
          IS_PROD=false
          
          # Check Workflow Dispatch Input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.environment }}" == "prod" ]]; then
              IS_PROD=true
            fi
          # Check Branch Logic (Push event)
          elif [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/staging" ]]; then
            IS_PROD=true
          fi
          
          echo "IS_PROD=$IS_PROD" >> $GITHUB_ENV
          echo "Build environment is Prod: $IS_PROD"

      - name: Init workspace
        uses: ./.github/workflows/init-workspace

      - name: Set up ruby env
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3 # do not use head
          bundler-cache: true

      - name: Set up java env
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Bundle install for Android Gemfile
        run: bundle install
        timeout-minutes: 5
        working-directory: ./app/android

      - name: Set up Flutter with FVM
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          # todo
          cache: false

      - name: Prepare upload key
        run: |
          echo "$STUDYU_ANDROID_KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          echo "$STUDYU_KEY_PROPERTIES" > key.properties
        working-directory: app/android
        env:
          STUDYU_ANDROID_KEYSTORE_BASE64: ${{ secrets.STUDYU_ANDROID_KEYSTORE_BASE64 }}
          STUDYU_KEY_PROPERTIES: ${{ secrets.STUDYU_KEY_PROPERTIES }}

      - name: Build StudyU app bundle (prod)
        if: ${{ env.IS_PROD == 'true' }}
        run: flutter build appbundle --release --build-number ${{ github.run_number }}
        working-directory: ./app

      - name: Build StudyU app bundle (dev)
        if: ${{ env.IS_PROD == 'false' }}
        run: flutter build appbundle --release --build-number ${{ github.run_number }} --dart-define=STUDYU_ENV=.env.dev
        working-directory: ./app

      - name: Fastlane upload
        run: bundle exec fastlane deploy_internal
        working-directory: ./app/android
        timeout-minutes: 30
        env:
          PLAY_CREDS_JSON: ${{ secrets.PLAY_CREDS_JSON }}
