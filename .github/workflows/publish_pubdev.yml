name: Publish to Pub.dev

# on: push should normally be enough. Using tags is not necessary, since publishing only occurs
# when the version in the pubspec.yml file differs from the pub.dev version. However, additional
# filtering with tags could serve as a second safeguard against accidental version changes and
# thus erroneous publications.
# See: https://github.com/marketplace/actions/dart-and-flutter-package-publisher

on:
  push:
    branches:
      - main
    # Uncomment the following lines to publish only when a tag matching the pattern is pushed
    # tags:
    #  - 'studyu_core-v*'
    #  - 'studyu_flutter_common-v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-publish-pubdev
  cancel-in-progress: true

jobs:
  publish_core:
    name: 'Publish studyu_core to Pub.dev'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5

      # Remove workspace resolution lines from packages
      - name: Remove workspace resolution
        run: |
          echo "Removing 'resolution: workspace' from core/pubspec.yaml"
          sed -i '/^resolution: workspace$/d' core/pubspec.yaml
          
          echo "Removing core from root workspace"
          sed -i '/- core/d' pubspec.yaml

      - name: '>> Dart package core <<'
        uses: k-paxian/dart-package-publisher@master
        with:
          accessToken: ${{ secrets.OAUTH_ACCESS_TOKEN }}
          refreshToken: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          relativePath: core
          flutter: false

  publish_flutter_common:
    name: 'Publish studyu_flutter_common to Pub.dev'
    needs: publish_core
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5

      # Remove workspace resolution lines from packages
      - name: Remove workspace resolution
        run: |
          echo "Removing 'resolution: workspace' from flutter_common/pubspec.yaml"
          sed -i '/^resolution: workspace$/d' flutter_common/pubspec.yaml
          
          echo "Removing flutter_common from root workspace"
          sed -i '/- flutter_common/d' pubspec.yaml

      - name: '>> Dart package flutter_common <<'
        uses: k-paxian/dart-package-publisher@master
        with:
          accessToken: ${{ secrets.OAUTH_ACCESS_TOKEN }}
          refreshToken: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          relativePath: flutter_common
          flutter: true
