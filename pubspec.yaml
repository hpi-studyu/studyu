name: studyu
description: The root of the StudyU project
publish_to: none
environment:
  sdk: '>=3.5.0 <4.0.0'
workspace:
  - core
  - flutter_common
  - app
  - designer_v2
  - studyu_validator
  - tools/study_data_docs
dev_dependencies:
  melos: ^8.0.0

melos:
  repository: https://github.com/hpi-studyu/studyu
  sdkPath: .fvm/flutter_sdk
  scripts:
    fix:
      run: |
        melos exec -c 6 -- \
          "dart fix --apply"
      description: Fix auto-fixable lint errors

    outdated:
      run: |
        melos exec -c 6 --fail-fast -- \
          "dart pub outdated"
      description: Check all outdated dependencies

    upgrade:
      run: |
        dart pub upgrade
        melos exec -c 6 --fail-fast -- \
          "dart pub upgrade" && melos bootstrap
      description: Check all outdated dependencies

    # Warning: This will also upgrade to dev versions.
    #upgrade:major:
    #  run: |
    #    dart pub upgrade --major-versions
    #    melos exec -c 6 --fail-fast -- \
    #      "dart pub upgrade --major-versions" && melos bootstrap
    #  description: Upgrade all dependencies to their latest major versions

    test:
      run: |
        rtk_prefix=""
        if command -v rtk >/dev/null 2>&1; then
          rtk_prefix="rtk "
        fi
        melos exec -c 1 --fail-fast -- \
          'rtk_prefix=""; \
          if command -v rtk >/dev/null 2>&1; then rtk_prefix="rtk "; fi; \
          if grep -q "sdk: flutter" pubspec.yaml; then ${rtk_prefix}flutter test; else dart test; fi'
      description: Run `flutter test` for a specific package.
      packageFilters:
        dirExists: test

    generate:
      run: |
        rtk_prefix=""
        if command -v rtk >/dev/null 2>&1; then
          rtk_prefix="rtk "
        fi
        melos exec -c 1 --fail-fast -- \
          "${rtk_prefix}dart run build_runner build"
      description: Generate files with build_runner
      packageFilters:
        scope:
          - 'studyu_core'
          - 'studyu_designer_v2'

    docs:study-data:write:
      run: |
        dart run tools/study_data_docs/bin/study_data_docs.dart --write
      description: Regenerates StudyU core study-data markdown docs

    docs:study-data:check:
      run: |
        dart run tools/study_data_docs/bin/study_data_docs.dart --check
      description: Checks StudyU core study-data markdown docs are up to date

    docs:study-data:schema:
      run: |
        dart run core/tool/emit_schema.dart
      description: regenerate core/lib/src/validators/schema/study.schema.json

    qualitycheck:
      run: |
        rtk_prefix=""
        if command -v rtk >/dev/null 2>&1; then
          rtk_prefix="rtk "
        fi
        if [ "$CI" != "true" ]; then
          fvm install
        fi
        melos format
        melos generate
        melos docs:study-data:check
        if [ "$CI" = "true" ]; then
          ${rtk_prefix}dart analyze
          ${rtk_prefix}flutter analyze
        else
          fvm exec ${rtk_prefix}dart analyze
          fvm exec ${rtk_prefix}flutter analyze
        fi
      description: Run format, generate, and analyze checks

    reset:
      run: |
        git clean -x -d -f -q || true
        melos clean
        melos exec --flutter --concurrency=1 -- "flutter clean"
        melos bootstrap
      description: Reset the workspace to a pristine checkout status.

    app:
      run: |
        melos exec -c 1 -- \
          "flutter run -d chrome --web-port 8080"
      packageFilters:
        scope: studyu_app
      description: Runs StudyU App with default environment

    designer_v2:
      run: |
        melos exec -c 1 -- \
          "flutter run -d chrome --web-port 8081"
      packageFilters:
        scope: studyu_designer_v2
      description: Runs StudyU Designer with default environment

    dev:app:
      run: |
        melos exec -c 1 -- \
          "flutter run -d chrome --web-port 8080 --dart-define=STUDYU_ENV=.env.dev"
      packageFilters:
        scope: studyu_app
      description: Runs StudyU App with the development environment

    dev:designer_v2:
      run: |
        melos exec -c 1 -- \
          "flutter run -d chrome --web-port 8081 --dart-define=STUDYU_ENV=.env.dev"
      packageFilters:
        scope: studyu_designer_v2
      description: Runs StudyU Designer with the development environment

    local:app:
      run: |
        melos exec -c 1 -- \
          "flutter run -d chrome --web-port 8080 --dart-define=STUDYU_ENV=.env.local"
      packageFilters:
        scope: studyu_app
      description: Runs StudyU App with local environment

    local:designer_v2:
      run: |
        melos exec -c 1 -- \
          "flutter run -d chrome --web-port 8081 \
           --dart-define=STUDYU_ENV=.env.local \
           --dart-define=EMAIL=user1@studyu.health \
           --dart-define=PASSWORD=user1pass \
           --dart-define=AUTO_LOGIN=false"
      packageFilters:
        scope: studyu_designer_v2
      description: Runs StudyU Designer with local environment

    build:android:
      run: |
        melos exec -c 2 --fail-fast -- \
          "flutter build apk"
      description: Build app for Android.
      packageFilters:
        dirExists: android

    build:ios:
      run: |
        melos exec -c 2 --fail-fast -- \
          "flutter build ipa --no-codesign"
      description: Build app for iOS.
      packageFilters:
        dirExists: ios

    build:web:
      run: |
        melos exec -c 2 --fail-fast -- \
          "flutter build web"
      description: Build app for Web.
      packageFilters:
        scope: [ studyu_app, studyu_designer_v2 ]
        dirExists: web

    build:web:app:
      run: |
        melos exec -c 1 --fail-fast -- \
          "flutter build web"
      description: Build app for Web.
      packageFilters:
        scope: studyu_app

    build:web:designer_v2:
      run: |
        melos exec -c 1 --fail-fast -- \
          "flutter build web"
      description: Build designer_v2 for Web.
      packageFilters:
        scope: studyu_designer_v2

    build:web:dev:
      run: |
        melos exec -c 2 --fail-fast -- \
          "flutter build web --dart-define=STUDYU_ENV=.env.dev"
      description: Build web dev.
      packageFilters:
        scope: [ studyu_app, studyu_designer_v2 ]
        dirExists: web

    build:web:app:dev:
      run: |
        melos exec -c 2 --fail-fast -- \
          "flutter build web --dart-define=STUDYU_ENV=.env.dev"
      description: Build web app dev.
      packageFilters:
        scope: studyu_app
        dirExists: web

    build:web:designer_v2:dev:
      run: |
        melos exec -c 2 --fail-fast -- \
          "flutter build web --dart-define=STUDYU_ENV=.env.dev"
      description: Build web designer_v2 dev.
      packageFilters:
        scope: studyu_designer_v2
        dirExists: web
